name: payment build and scan

on:
  push:
    branches:
      - feature

  workflow_dispatch:
    inputs:
      ECRURL:
        description: "ECR Registry URL"
        required: true
        default: "081654307023.dkr.ecr.ap-south-1.amazonaws.com"

      APPREPO:
        description: "Docker Repo Name"
        required: true
        default: "wezvatechpayment"

      REGION:
        description: "AWS Region"
        required: true
        default: "ap-south-1"         

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # Checkout Code
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # Build and unit test
      # -----------------------------
      - name: Setup go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Check go version
        run: go version

      - name: Install Dependencies
        run: go mod tidy

      - name: Build App
        run: go build -o app ./cmd/app

      # -------------------------------
      # Stage 2: Code Coverage
      # -------------------------------
      - name: Code Coverage Report (JaCoCo)
        run: echo "completed code coverage"

      # -----------------------------
      # Trivy Dependency Check (SCA)
      # -----------------------------
      - name: Trivy FS Scan (SCA)
        run: echo "completed SCA"

      # ---------------------
      # SonarCloud SAST Scan
      # ---------------------
      - name: SonarCloud SAST Scan
        run: echo "completed Sonar Scan"

      # -----------------------------
      # Configure AWS Credentials
      # -----------------------------     
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.REGION || 'ap-south-1' }}

      # -----------------------------
      # Login to Amazon ECR
      # -----------------------------
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2 

      # -----------------------------
      # Build & Push Docker Image
      # ----------------------------- 
      - name: Build and Push Docker Image
        env:
          ECR_REGISTRY: ${{ inputs.ECRURL || '081654307023.dkr.ecr.ap-south-1.amazonaws.com' }}
          REPOSITORY: ${{ inputs.APPREPO || 'wezvatechpayment' }}
          IMAGE_TAG: fb${{ github.run_number }}
        run: |
          echo "Building Docker Image..."
          docker build -t $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG .
          echo "Pushing Docker Image..."
          docker push $ECR_REGISTRY/$REPOSITORY:$IMAGE_TAG
        

  # -----------------------------
  # Trigger CD Job
  # -----------------------------
  trigger-cd-pipeline:
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: ${{ success() && github.ref == 'refs/heads/main' }}

    steps:
      - name: Trigger CD Pipeline
        run: |
          IMAGE_TAG="fb${{ github.run_number }}"

          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/wezva-fintech/payment-deployment/actions/workflows/deploy.yml/dispatches \
          -d "{
            \"ref\":\"main\",
            \"inputs\": {
              \"ECRURL\": \"${{ inputs.ECRURL }}/\",
              \"REPO\": \"${{ inputs.APPREPO }}\",
              \"IMAGE\": \"$IMAGE_TAG\",
              \"TEST\": \"functional\"
            }
          }"